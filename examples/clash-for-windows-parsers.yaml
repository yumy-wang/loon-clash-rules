parsers:
  - url: "YOUR_AIRPORT_SUBSCRIPTION_URL"
    yaml:
      mix-rule-providers:
        my_reject:
          type: http
          behavior: classical
          format: text
          url: "https://raw.githubusercontent.com/yumy-wang/loon-clash-rules/main/rules/reject.list"
          interval: 3600
          path: ./ruleset/my/reject.list
        my_direct:
          type: http
          behavior: classical
          format: text
          url: "https://raw.githubusercontent.com/yumy-wang/loon-clash-rules/main/rules/direct.list"
          interval: 3600
          path: ./ruleset/my/direct.list
        my_proxy:
          type: http
          behavior: classical
          format: text
          url: "https://raw.githubusercontent.com/yumy-wang/loon-clash-rules/main/rules/proxy.list"
          interval: 3600
          path: ./ruleset/my/proxy.list
      prepend-rules:
        - RULE-SET,my_reject,REJECT
        - RULE-SET,my_direct,DIRECT
        - RULE-SET,my_proxy,Proxies
